<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Connector Search</title>
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/mirotone/dist/styles.css" />
    <style>
      html, body { height: 100%; }
      body {
        margin: 0; padding: 16px; box-sizing: border-box;
        display: flex; flex-direction: column;
      }
      .subtitle { font-size: 12px; color: #787878; margin-bottom: 12px; }
      .sortrow {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 8px; flex: 0 0 auto; font-size: 12px; color: #585858;
      }
      .sortrow select { flex: 1; font-size: 12px; padding: 2px 4px; }
      .row { display: flex; gap: 8px; margin-bottom: 12px; flex: 0 0 auto; }
      .row input { flex: 1; }
      .meta { font-size: 12px; color: #585858; margin-bottom: 8px; flex: 0 0 auto; }
      .muted { color: #787878; font-size: 12px; }
      /* Results take the remaining height and scroll with the mouse wheel. */
      #results { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .result {
        border: 1px solid #e6e6e6; border-radius: 6px;
        padding: 8px 10px; margin-bottom: 8px; cursor: pointer;
      }
      .result:hover { background: #f2f2f4; }
      .result .caption {
        font-size: 13px; word-break: break-word;
      }
      .result .sub { font-size: 11px; color: #787878; }
      mark { background: #ffd02f; padding: 0 1px; }
    </style>
  </head>
  <body>
    <div class="subtitle">Click to jump to an end (click again for the other)</div>
    <div class="row">
      <input id="q" class="input" type="text"
             placeholder="Search connector text…" autocomplete="off" />
      <button id="go" class="button button-primary">Search</button>
    </div>
    <div class="sortrow">
      <label for="sort">Sort</label>
      <select id="sort">
        <option value="az">A → Z / 0 → 9</option>
        <option value="za">Z → A / 9 → 0</option>
        <option value="board">Board order</option>
      </select>
    </div>
    <div class="meta" id="status">Type a term and press Search (or Enter).</div>
    <div id="results"></div>
    <script src="app.js?v=20260624j"></script>
  </body>
</html>
