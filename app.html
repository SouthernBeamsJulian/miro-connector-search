<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Connector Search</title>
    <!-- Miro Web SDK -->
    <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <!-- Mirotone: Miro's official CSS so the panel matches the board UI -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/mirotone/dist/styles.css"
    />
    <style>
      body {
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .row input {
        flex: 1;
      }
      .meta {
        font-size: 12px;
        color: var(--indigo700, #4262ff);
        margin-bottom: 8px;
      }
      .muted {
        color: #585858;
        font-size: 12px;
      }
      .result {
        border: 1px solid #e6e6e6;
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .result:hover {
        background: #f2f2f4;
      }
      .result .caption {
        font-size: 13px;
        margin-bottom: 2px;
        word-break: break-word;
      }
      .result .sub {
        font-size: 11px;
        color: #787878;
      }
      mark {
        background: #ffd02f;
        padding: 0 1px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <input
        id="q"
        class="input"
        type="text"
        placeholder="Search connector text…"
        autocomplete="off"
      />
      <button id="go" class="button button-primary">Search</button>
    </div>
    <div class="meta" id="status">Type a term and press Search (or Enter).</div>
    <div id="results"></div>

    <script src="app.js"></script>
  </body>
</html>
